<svg class="v-progress-circular-track" [class.v-progress-complete]="complete()">
  <circle class="v-progress-circular-background" />
  <circle
    class="v-progress-circular-bar"
    [style.stroke-dasharray]="
       determinate() ? initialSize() : initialSize() ? initialSize() * 0.8 : null
     "
    [style.stroke-dashoffset]="determinate() ? dashOffset() : null"
    #progressBar
  />
</svg>
<ng-content />
