@if (copyData()) {
<div class="snippet-container markdown-style">
  <div class="snippet-copy">
    @if (copyFlagOpen) {
    <div class="code-copied" vAlternate vSurface>
      <span vTypography="label-small">Code copied!</span>
      <button
        #copyFlagClose
        v-button-icon
        buttonSize="small"
        buttonColor="tertiary"
        class="code-copied-button"
        (click)="closeCopiedFlag()"
        [attr.aria-label]="'copied ' + ariaLabelText() + '; Close code copied'"
      >
        <svg v-icon-visa-close-tiny></svg>
      </button>
    </div>
    }
    <button
      #copyButton
      v-button
      v-button-icon
      buttonColor="tertiary"
      buttonSize="small"
      class="w-copy-button"
      [attr.aria-label]="'copy ' + ariaLabelText()"
      (click)="onCopyToClipboard($event)"
    >
      <svg v-icon-visa-copy-tiny></svg>
    </button>
  </div>
  <markdown [data]="copyData() | language: codeLanguage()"></markdown>
</div>
}
