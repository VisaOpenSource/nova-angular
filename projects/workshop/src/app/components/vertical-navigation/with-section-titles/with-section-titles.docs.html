<div class="app-container">
  <header v-nav vertical>
    @if (navOpen) {
    <a v-skip-to-content v-link routerLink="./" fragment="content">Skip to content</a>
    <a
      v-link
      noUnderline
      vFlex
      vFlexCol
      vMT="16"
      vMB="30"
      vML="24"
      vMR="14"
      vGap="12"
      aria-label="Visa Application Name home"
      href="/"
      style="background-color: transparent"
      ><svg v-logo-visa />
      <div vTypography="subtitle-1" class="v-nav-app-name">Application Name</div>
    </a>
    <nav aria-label="Vertical with section titles" vMB="6">
      <ul v-tabs vertical>
        <li v-tab-item>
          <h2 v-tab-item sectionTitle>Section title L1</h2>
          <ul v-tabs vertical style="--v-tabs-vertical-nested-count: 1">
            <li v-tab-item>
              <a v-button buttonColor="tertiary" href="./components/vertical-navigation"> L1 label 1</a>
            </li>
            <li v-tab-item>
              <a v-button buttonColor="tertiary" href="./components/vertical-navigation"> L1 label 2</a>
            </li>
            <li v-tab-item>
              <a v-button buttonColor="tertiary" href="./components/vertical-navigation"> L1 label 3</a>
            </li>
          </ul>
        </li>
        <li v-tab-item>
          <h2 v-tab-item sectionTitle>Section title L2</h2>
          <ul v-tabs vertical style="--v-tabs-vertical-nested-count: 1">
            <li v-tab-item>
              <a v-button buttonColor="tertiary" href="./components/vertical-navigation"> L1 label 4 </a>
            </li>
            <li v-tab-item>
              <a v-button buttonColor="tertiary" href="./components/vertical-navigation"> L1 label 5</a>
            </li>
            <li v-tab-item>
              <a v-button buttonColor="tertiary" href="./components/vertical-navigation"> L1 label 6 </a>
            </li>
          </ul>
        </li>
      </ul>
    </nav>
    }
    <hr v-divider dividerType="decorative" vMB="6" vMT="auto" style="inline-size: 100%" />
    @if (navOpen) {
    <div vFlex vFlexCol vAlignSelfStretch vMB="4">
      <div v-tab-item disclosureTab (disclosureTabToggled)="avatarOpen = !avatarOpen">
        <button
          v-button
          buttonColor="tertiary"
          buttonSize="large"
          aria-label="Alex Miller"
          aria-controls="section-titles-profile-links"
          [attr.aria-expanded]="avatarOpen"
        >
          <svg v-icon-visa-account-tiny />
          Alex Miller
          <v-icon-visa-toggle>
            <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
            <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
          </v-icon-visa-toggle>
        </button>
        <div
          [vHide]="!avatarOpen"
          vFlex
          vFlexCol
          vP="4"
          id="section-titles-profile-links"
          [attr.aria-hidden]="!avatarOpen"
        >
          <ul v-tabs vertical>
            <li v-tab-item>
              <a
                v-button
                vFlex
                vJustifyContentStart
                vTypography="label-large"
                buttonColor="tertiary"
                buttonSize="large"
                href="./components/vertical-navigation"
                >L2 label 1</a
              >
            </li>
            <li v-tab-item>
              <a
                v-button
                vFlex
                vJustifyContentStart
                vTypography="label-large"
                buttonColor="tertiary"
                buttonSize="large"
                href="./components/vertical-navigation"
                >L2 label 2</a
              >
            </li>
          </ul>
        </div>
      </div>
    </div>
    }
    <button
      v-button-icon
      buttonColor="tertiary"
      buttonSize="small"
      subtle
      [vML]="navOpen ? 'auto' : ''"
      [vMR]="navOpen ? 8 : ''"
      [vMX]="navOpen ? '' : 5"
      (click)="navOpen = !navOpen"
      aria-label="Side bar"
      [aria-expanded]="navOpen"
    >
      @if (navOpen) {
      <svg v-icon-visa-media-rewind-tiny />
      } @else {
      <svg v-icon-visa-media-fast-forward-tiny />
      }
    </button>
  </header>
  <div class="main-content">Main content</div>
</div>
