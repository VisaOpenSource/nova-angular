<section aria-label="Transactions" style="max-inline-size: 343px">
  <div vFlex vAlignItemsCenter vJustifyContentBetween vTypography="label" vMB="6">
    <span>Transactions</span>
    <a v-link noUnderline vTypography="label" href="./components/list-item">
      See more
      <svg v-icon-visa-chevron-right-tiny />
    </a>
  </div>
  <ul v-content-card vP="4" style="--v-content-card-border: 0px; --v-content-card-border-radius: 8px">
    @for(item of items; track item.id) {
    <li
      vSurface
      vPX="8"
      vPY="6"
      vFlex
      vAlignItemsCenter
      vJustifyContentBetween
      vTypography="label-large"
      style="min-block-size: 64px"
    >
      <div vFlex vGap="8" vAlignItemsCenter>
        <span v-avatar aria-label="Merchant Name">MN</span>
        <span vTypography="body-3">{{ item.merchantName }}</span>
      </div>
      <div vFlex vFlexCol style="text-align: end">
        <span vTypography="subtitle-2">- $14.57</span>
        <span vTypography="label" vTypographyColor="subtle">$1,234.56</span>
      </div>
    </li>
    }
  </ul>
</section>
