<ul
  v-content-card
  vP="4"
  style="max-inline-size: 343px; --v-content-card-border: 0px; --v-content-card-border-radius: 8px"
>
  @for(item of items; track item.id) {
  <li vSurface vP="0">
    <a
      href="./components/list-item"
      v-button
      buttonColor="tertiary"
      vFlex
      vAlignItemsCenter
      vJustifyContentBetween
      vTypography="label-large"
      vPL="8"
      vPR="4"
      vPY="6"
      style="color: var(--palette-default-text); --v-button-default-border-radius: 0px; min-block-size: 64px"
      >{{ item.text }}
      <svg v-icon-visa-chevron-right-tiny style="color: var(--palette-default-active)" />
    </a>
  </li>
  }
</ul>
