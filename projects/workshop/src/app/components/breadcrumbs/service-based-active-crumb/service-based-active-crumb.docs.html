<nav aria-label="breadcrumbs with service-based active crumb" v-breadcrumbs>
  <ol>
    @for( page of pages; track page.path;let i = $index) { @if(i <= activeIndex()) {
    <li>
      @if(i < activeIndex()) {
      <a v-link [routerLink]="page.path">{{ page.text }}</a>
      } @else {
      <span aria-current="page">{{ page.text }}</span>
      }
    </li>
    } }
  </ol>
</nav>
