@if (form(); as formRef) {
<div vFlexCol vGap="6" vMT="24">
  @let values = formRef.values();
  <nova-reusable-accordion
    [count]="values['count']"
    [description]="values['description']"
    [disabled]="values['disabled']"
    [multiselect]="values['multiselect']"
    [name]="values['multiselect'] ? null : name"
    [open]="values['open']"
    [padding]="values['padding']"
    [showIcon]="values['showToggleIcon']"
    [subtle]="values['subtle']"
    [title]="values['title']"
  >
    @if (values['showIcon']) {
    <svg v-icon-visa-cloud-low prefix />
    } @if (values['showBadge']) {
    <div v-badge badgeType="stable" vML="auto" suffix>
      <svg v-icon-visa-success-tiny vM="0" />
      <span>Label</span>
    </div>
    }
  </nova-reusable-accordion>
</div>
}
<nova-dynamic-reusable-form [properties]="propertyConfigs" #formComponent />
