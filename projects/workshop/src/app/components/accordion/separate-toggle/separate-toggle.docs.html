<div v-accordion>
  <div v-accordion-item>
    <div v-accordion-heading id="accordion-heading-standalone" vFlex vAlignItemsCenter>
      <input
        id="checkbox-standalone"
        value="checkbox-standalone-value"
        aria-labelledby="accordion-heading-standalone"
        v-checkbox
      />
      Accordion title
      <button
        v-button-icon
        (click)="toggleExpanded()"
        [aria-expanded]="expanded()"
        buttonSize="small"
        aria-labelledby="accordion-heading-standalone"
        vMY="auto"
        vML="auto"
      >
        @if (expanded()) {
        <svg v-icon-visa-chevron-down-tiny style="--v-accordion-icon-color: white" />
        } @else {
        <svg v-icon-visa-chevron-right-tiny style="--v-accordion-icon-color: white" />
        }
      </button>
    </div>
    <div v-accordion-panel [attr.aria-hidden]="!expanded()" [vHide]="!expanded()">
      This is required text that describes the accordion section in more detail.
    </div>
  </div>
</div>
