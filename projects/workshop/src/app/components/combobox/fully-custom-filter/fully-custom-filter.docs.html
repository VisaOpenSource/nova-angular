<!-- This example only matches input that matches an item label EXACTLY -->
<!-- Whereas the service uses '.includes' by default -->
<div v-combobox v-floating-ui-container (filter)="filter($event)">
  <label v-label>Label</label>
  <div v-input-container v-floating-ui-trigger vMY="4">
    <input v-input aria-describedby="custom-filter-no-results" />
    <button v-button-icon buttonColor="tertiary" buttonSize="small" aria-label="toggle">
      <v-icon-visa-toggle>
        <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
        <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
      </v-icon-visa-toggle>
    </button>
  </div>
  <div v-listbox-container v-floating-ui-element>
    <ul v-listbox>
      @for(item of filteredItems(); track item.value) {
      <li v-listbox-item [value]="item.value">{{ item.label }}</li>
      } @empty {
      <li
        id="custom-filter-no-results"
        vFlex
        vJustifyContentCenter
        vAlignItemsCenter
        vPY="10"
        vPX="7"
        aria-atomic="true"
        aria-live="assertive"
      >
        <p vTypography="label-large">No results found</p>
      </li>
      }
    </ul>
  </div>
</div>
