<div v-combobox v-floating-ui-container (itemSelected)="valueUpdated($event)" [(value)]="comboboxValue">
  <label v-label>{{ label() }}</label>
  <div v-input-container v-floating-ui-trigger>
    <input v-input aria-describedby="shared-combobox-no-results" />
    <button v-button-icon buttonColor="tertiary" buttonSize="small" aria-label="toggle">
      <v-icon-visa-toggle>
        <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
        <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
      </v-icon-visa-toggle>
    </button>
  </div>
  <div v-listbox-container v-floating-ui-element>
    <ul v-listbox style="max-block-size: 180px">
      @for (item of filteredItems() | slice: firstIndex() : lastIndex(); track item.value) {
        <li v-listbox-item [value]="item.value">{{ item.label }}</li>
      } @empty {
        <li
          id="shared-combobox-no-results"
          vFlex
          vJustifyContentCenter
          vAlignItemsCenter
          vPY="10"
          vPX="7"
          aria-atomic="true"
          aria-live="assertive"
        >
          <p vTypography="label-large">No results found</p>
        </li>
      }
    </ul>
    @if (showLoadMore()) {
      <button v-button buttonColor="secondary" (click)="loadMore()">Load more</button>
    }
  </div>
</div>
