<!-- 
 * NOTE: Error styling relies on the v-label and v-input-container elements being direct siblings
 * within the v-combobox host element. Wrapping either element in an extra container (e.g., a <div>)
 * will break the sibling CSS selector and prevent error styles from being applied.
 *
 * Forcing error styles with utility classes like `v-input-error` on a parent element will cause
 * non-listbox text content (e.g., a <span>subtitle</span> inside a v-listbox-item) to also
 * turn red, which may not be the desired behavior.
 *
 * Keep the v-label and v-input-container directives as direct children of the v-combobox host
 * to ensure error states render correctly.
-->
<div v-combobox v-floating-ui-container #combobox [invalid]="isInvalid()" [(value)]="comboboxVal">
  <label v-label>Label (required)</label>
  <div v-input-container v-floating-ui-trigger vMY="4">
    <input v-input required aria-describedby="default-error-message" />
    <button v-button-icon buttonColor="tertiary" buttonSize="small" aria-label="toggle">
      <v-icon-visa-toggle>
        <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
        <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
      </v-icon-visa-toggle>
    </button>
  </div>
  <span v-input-message id="default-error-message" aria-atomic="true" aria-live="assertive">
    @if (isInvalid()) {
    <svg v-icon-visa-error-tiny />
    This is required text that describes the error in more detail. }
  </span>
  <div v-listbox-container v-floating-ui-element>
    <ul v-listbox>
      <li v-listbox-item value="option-a">Option A</li>
      <li v-listbox-item value="option-b">Option B</li>
      <li v-listbox-item value="option-c">Option C</li>
      <li v-listbox-item value="option-d">Option D</li>
      <li v-listbox-item value="option-e">Option E</li>
    </ul>
  </div>
</div>

<div vMT="12" vFlex vGap="16">
  <button v-button (click)="submit()">Submit</button>
  <button v-button buttonColor="secondary" (click)="reset()">Reset</button>
</div>
