<!-- prettier-ignore -->
<div v-section v-message [messageType]="messageType()">
  @if(showIcon()) {
    @switch (messageType()) {
      @case ('error') {
        <svg v-message-icon v-icon-visa-error-low aria-hidden="false" aria-label="Error" role="img"></svg>
      }
      @case ('subtle') {
        <svg v-message-icon v-icon-visa-idea-low aria-hidden="false" aria-label="Idea" role="img"></svg>
      }
      @case ('warning') {
        <svg v-message-icon v-icon-visa-warning-low aria-hidden="false" aria-label="Warning" role="img"></svg>
      }
      @case ('success') {
        <svg v-message-icon v-icon-visa-success-low aria-hidden="false" aria-label="Success" role="img"></svg>
      }
      @case ('information') {
        <svg v-message-icon v-icon-visa-information-low aria-hidden="false" aria-label="Information" role="img"></svg>
      }
    }
  }

  <ng-content select="[icon]" />

  <div v-message-content vPL="2" vPB="2">
    <span #titleContainer></span>
    @if(description()){
      <p>{{description()}}</p>
    }
    @if(showButton()){
      <button [vMR]="showLink() ? 8 : 0" (click)="buttonClick.emit($event)" v-button buttonColor="secondary" [vMT]="8">{{buttonLabel()}}</button>
    }
    @if(showLink()){
      <a v-link [routerLink]="href()">{{linkLabel()}}</a>
    }
    <ng-content />
  </div>

  @if(dismissible()){
  <button
    (click)="close.emit()"
    v-button-icon
    subtle
    vMT="-8"
    vMR="-8"
    vML="14"
    vP="7"
    buttonSize="small"
    buttonColor="tertiary"
    aria-label="close"
  >
    <svg v-icon-visa-close-tiny />
  </button>
  }
</div>
