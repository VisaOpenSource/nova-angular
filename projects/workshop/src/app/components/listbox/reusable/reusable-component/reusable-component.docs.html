<label v-label [for]="id() + '-listbox-container'" [id]="id() + '-label'">{{label()}}</label>
<div
  (blur)="handleBlur()"
  v-listbox-container
  [id]="id() + '-listbox-container'"
  [attr.aria-labelledby]="listboxDescribedBy()"
>
  <ul
    v-listbox
    [containHeight]="containHeight()"
    [disabled]="disabled()"
    [invalid]="invalid()"
    [multiselect]="multiselect()"
    [value]="value()"
    (valueChange)="writeValue($event)"
  >
    @for(option of options(); track id() + '-' + option.value) {
    <li v-listbox-item [disabled]="option.disabled" [value]="option.value" [active]="option.active">
      {{ option.label }}
    </li>
    }
  </ul>
</div>
<div
  v-input-message
  [id]="id() + '-message'"
  [attr.role]="invalid() ? 'alert' : null"
  [attr.aria-live]="invalid() ? 'polite' : null"
>
  @if (invalid()) {
  <svg v-icon-visa-error-tiny />} {{message()}}
</div>
