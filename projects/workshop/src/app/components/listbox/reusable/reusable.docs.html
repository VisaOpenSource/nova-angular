@if (form(); as formRef) {
<div vFlexCol vGap="6" vMT="24">
  @let values = formRef.values();
  <nova-reusable-listbox
    [autoSelect]="values['autoSelect']"
    [containHeight]="values['containHeight']"
    [disabled]="values['disabled']"
    [invalid]="values['invalid']"
    [label]="values['label']"
    [message]="values['invalid'] ? values['errorMessage'] : (values['input-message'] ? values['message'] : undefined)"
    [multiselect]="values['multiselect']"
    [options]="parseOptions(values['options'])"
  />
</div>
}
<nova-dynamic-reusable-form [properties]="propertyConfigs" #formComponent />
