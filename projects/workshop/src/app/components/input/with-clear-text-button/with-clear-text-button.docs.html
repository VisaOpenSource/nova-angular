<div vFlex vGap="4" vFlexCol>
  <label v-label for="button-input">Label (required)</label>
  <div v-input-container>
    <input v-input [(value)]="value" (focus)="focus()" (blur)="blur($event)" #inputRef required id="button-input" />
    @if(value && value.length > 0 && inFocus){
    <button
      v-button-icon
      (focus)="focus()"
      (blur)="blur($event)"
      buttonSize="small"
      subtle
      buttonColor="tertiary"
      (click)="clearAndFocus()"
      aria-label="clear"
    >
      <svg v-icon-visa-clear-alt-tiny /></button
    >}
  </div>
</div>
