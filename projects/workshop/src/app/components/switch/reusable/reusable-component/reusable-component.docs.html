<ng-template #switchInput>
  <input
    v-switch
    [(checked)]="checked"
    (blur)="onTouched()"
    (change)="handleChange($event)"
    [attr.aria-describedby]="inputDescribedBy()"
    [attr.aria-required]="required() ? 'true' : null"
    [disabled]="disabled()"
    [id]="id() + '-input'"
    [invalid]="invalid()"
    [required]="required()"
    type="checkbox"
  />
</ng-template>

<div vFlex vFlexWrap vAlignItemsCenter vJustifyContentBetween vM="8" vGap="10">
  @if(alignStart()){
  <ng-template [ngTemplateOutlet]="switchInput" />
  }
  <div vFlex vFlexCol vGap="2" vMT="2" vFlexGrow vFlexBasis="min-content">
    <label v-switch-label vTypography="label-large" v-label [for]="id() + '-input'"
      >{{label()}}{{required() ? ' (required)' : ''}}</label
    >
    @if(description()){
    <span v-input-message [id]="id() + '-description'" vTypography="body-3"> {{ description() }} </span>
    }
  </div>
  @if(!alignStart()){
  <ng-template [ngTemplateOutlet]="switchInput" />
  }
</div>

<span
  v-input-message
  [id]="id() + '-message'"
  [attr.aria-atomic]="invalid() || null"
  [attr.aria-live]="invalid() ? 'assertive' : null"
  vMT="4"
  [class.v-input-error]="invalid()"
>
  @if (invalid() && message()) {
  <svg v-icon-visa-error-tiny />} @if(message()){ {{ message() }} }
</span>
