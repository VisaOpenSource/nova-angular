<div vFlex vFlexCol vGap="32">
  @if (form(); as formRef) {
  <div vFlexCol vGap="6" vMT="24">
    @let values = formRef.values();
    <nova-reusable-checkbox
      [description]="values['description']"
      [disabled]="values['disabled']"
      [invalid]="values['invalid']"
      [label]="values['label']"
      [message]="values['invalid'] ? values['errorMessage'] : undefined"
      [panel]="values['panel']"
      [required]="values['required']"
      [checked]="values['checked']"
      [showLabel]="values['showLabel']"
      [showMessage]="values['showMessage']"
    />
  </div>
  }
  <div v-flag v-message messageType="information" [style.--v-message-max-inline-size]="'100%'">
    <svg v-message-icon v-icon-visa-information-low aria-hidden="false" aria-label="Information" role="img" />
    <div v-message-content vPL="2" vPB="2">
      <p>
        To create a group of checkboxes, see the
        <a routerLink="/examples/components/checkbox/reusable-group" v-link>reusable checkbox-group example</a>.
      </p>
    </div>
  </div>
</div>
<nova-dynamic-reusable-form [properties]="propertyConfigs" #formComponent />
