@if(panel()){
<div v-checkbox-panel>
  <ng-template [ngTemplateOutlet]="checkboxContent" />
</div>
} @else {
<ng-template [ngTemplateOutlet]="checkboxContent" />
}
<ng-template #checkboxContent>
  <div v-input-container [vFlex]="panel() && showMessage()" [vAlignItemsStart]="panel() && showMessage()">
    <input
      v-checkbox
      [(checked)]="checked"
      (blur)="onTouched()"
      (change)="handleChange($event)"
      [attr.aria-describedby]="inputDescribedBy()"
      [attr.aria-required]="required() ? 'true' : null"
      [disabled]="disabled()"
      [id]="id() + '-input'"
      [indeterminate]="indeterminate()"
      [invalid]="invalid()"
      [required]="required()"
      type="checkbox"
    />
    <div vFlex vFlexCol vGap="2" vMY="10" vAlignItemsStart>
      @if (showLabel()){
      <label v-label [for]="id() + '-input'">{{label()}}</label>
      } @if(showMessage()){
      <span v-input-message [id]="id() + '-description'"> {{ description() }} </span>
      }
    </div>
  </div>
</ng-template>

<span
  v-input-message
  [id]="id() + '-message'"
  [attr.aria-atomic]="invalid() || null"
  [attr.aria-live]="invalid() ? 'assertive' : null"
  vMT="4"
>
  @if (invalid() && message()) {
  <svg v-icon-visa-error-tiny />} @if(message()){ {{ message() }} }
</span>
