<fieldset>
  <legend v-label vTypography="label-large">Group label</legend>
  <ul vFlex vFlexCol>
    @for(item of nestedItems; track item.id){ @if(item.children){

    <li vFlex vFlexCol>
      <div v-input-container>
        <input
          [id]="item.id"
          name="checkbox-indeterminate"
          v-checkbox
          (change)="item.checked = !item.checked; onParentChange($event)"
          [checked]="item.checked"
          [indeterminate]="item.indeterminate"
        />
        <label v-label [for]="item.id">{{ item.label }}</label>
      </div>
      <ul vFlex vFlexCol vML="20">
        @for(child of item.children; track child.id){
        <ng-container [ngTemplateOutlet]="checkboxTemplate" [ngTemplateOutletContext]="{item: child, isChild: true}" />
        }
      </ul>
    </li>
    } @else {
    <ng-container [ngTemplateOutlet]="checkboxTemplate" [ngTemplateOutletContext]="{item: item, isChild: false}" />
    }

    <ng-template #checkboxTemplate let-item="item" let-isChild="isChild">
      <li v-input-container>
        <input
          [id]="item.id"
          name="checkbox-indeterminate-nested"
          v-checkbox
          [checked]="item.checked"
          (change)="item.checked = !item.checked; isChild && onChildChange()"
        />
        <label v-label [for]="item.id">{{ item.label }}</label>
      </li>
    </ng-template>
    }
  </ul>
</fieldset>
