@if (form(); as formRef) {
<div vFlexCol vGap="6" vMT="24">
  @let values = formRef.values();
  <nova-reusable-pagination
    [aria-label]="values['ariaLabel']"
    [compact]="values['compact']"
    [endBlockSize]="values['endBlockSize']"
    [inline]="values['inline']"
    [itemsPerPageOptions]="parseItemsPerPageOptions(values['itemsPerPageOptions'])"
    [middleBlockSize]="values['middleBlockSize']"
    [selectedPage]="values['selectedPage']"
    [showItemsPerPage]="values['showItemsPerPage']"
    [showPageRange]="values['showPageRange']"
    [startBlockSize]="values['startBlockSize']"
    [totalItems]="values['totalItems']"
  />
</div>
}
<nova-dynamic-reusable-form [properties]="propertyConfigs" #formComponent />
