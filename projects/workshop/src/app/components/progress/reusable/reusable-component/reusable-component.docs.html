<!-- prettier-ignore-file -->
@if(type() == 'linear') {
<progress
  v-progress-linear
  [invalid]="invalid()"
  [determinate]="determinate()"
  [class.progress-paused]="paused()"
  [id]="id()+ '-progress'"
  [percentage]="percentage()"
></progress>
<label v-label progressLabel [for]="id() + '-progress'">
  @if(showLabel()){
  <span vFlex vGap="4" role="alert" [class.v-sr]="!showLabel()">
    @if(invalid()){
    <svg v-icon-visa-error-tiny />
    } @else if(complete()){
    <svg v-icon-visa-success-tiny />
    } {{label()}}
  </span>
  } @if(!hidePercentage() && determinate()){
  <span>{{ percentage() }}%</span>
  }
  <span vSR role="alert">{{label()}}</span>
</label>
} @else {
<div vFlex [vFlexCol]="!inline()" [vAlignItemsCenter]="inline()" vGap="8">
  <div
    [attr.aria-invalid]="invalid() ? 'true' : null"
    v-progress-circular
    [attr.aria-valuenow]="determinate() ? percentage() : null"
    [determinate]="determinate()"
    [small]="small()"
    [class.progress-paused]="paused()"
    [percentage]="percentage()"
    [style.--v-progress-animation-factor]="speed()"
    [attr.aria-labelledby]="ariaLabelledBy()"
    [style]="circularProgressStyles()"
  >
    <div
      [class.circular-progress-label]="circularProgressStyles() !== null"
      [class.v-sr]="hidePercentage()"
      v-label
      vTypography="body-2-bold"
      [id]="id() + '-label'"
    >
      @if(determinate()){ {{percentage()}}%} @else{ {{label()}} }
    </div>
  </div>
  @if(showMessage()){
  <span
    vFlex
    vGap="4"
    v-input-message
    [class.v-input-error]="invalid()"
    [class.v-sr]="!showMessage()"
    role="alert"
    [id]="id()+'-message'"
  >
    @if(invalid()){
    <svg v-icon-visa-error-tiny />
    } @else if(complete()){
    <svg v-icon-visa-success-tiny />
    } {{message()}}
  </span>
  }
</div>
}
