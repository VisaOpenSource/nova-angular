@if (form(); as formRef) {
<div vFlexCol vGap="6" vMT="24">
  @let values = formRef.values();
  <nova-reusable-progress
    [aria-hidden]="values['ariaHidden']"
    [aria-labelledby]="values['labelledby']"
    [determinate]="values['determinate']"
    [hidePercentage]="values['hidePercentage']"
    [inline]="values['inline']"
    [invalid]="values['invalid']"
    [label]="values['label']"
    [max]="values['max']"
    [message]="values['message']"
    [paused]="values['paused']"
    [percentage]="values['percentage']"
    [role]="values['role']"
    [showLabel]="values['showLabel']"
    [showMessage]="values['showMessage']"
    [size]="values['size']"
    [small]="values['small']"
    [speed]="values['speed']"
    [type]="values['type']"
    [value]="values['value']"
  />
</div>
}
<nova-dynamic-reusable-form [properties]="propertyConfigs" #formComponent />
