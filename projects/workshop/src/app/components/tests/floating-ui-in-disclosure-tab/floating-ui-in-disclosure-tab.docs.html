<div v-tabs vertical>
  <div v-tab-item disclosureTab (disclosureTabToggled)="disclosureTabOpen = !disclosureTabOpen">
    <button v-button buttonColor="tertiary" aria-label="Alex Miller">
      <svg v-icon-visa-home-tiny />
      Label
      <v-icon-visa-toggle>
        <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
        <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
      </v-icon-visa-toggle>
    </button>
    @if (disclosureTabOpen) {
    <div vSurface vP="20">
      <div v-floating-ui-container>
        <button v-button v-floating-ui-trigger>
          Action
          <v-icon-visa-toggle>
            <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
            <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
          </v-icon-visa-toggle>
        </button>
        <div v-dropdown-menu vFlex vFlexCol>
          <ul v-dropdown-list vAddArrowKeys>
            <li>
              <button v-dropdown-item>Label 1</button>
            </li>
            <li>
              <button v-dropdown-item>Label 2</button>
            </li>
            <li>
              <button v-dropdown-item>Label 3</button>
            </li>
          </ul>
        </div>
      </div>
    </div>
    }
  </div>
</div>
