<div v-combobox v-floating-ui-container>
  <div vFlex>
    <label v-label>Label</label>
    <div v-floating-ui-container placement="right">
      <button
        v-button-icon
        buttonSize="small"
        buttonColor="tertiary"
        aria-label="Color selector accessibility information"
        aria-describedby="default-a11y-color-tooltip"
        v-floating-ui-trigger
      >
        <svg v-icon-visa-accessibility-tiny></svg>
      </button>
      <span v-tooltip id="default-a11y-color-tooltip"
        >For RGB, use values between 0–255. For HSL, use H values between 0–359, S and L values between 0–100%. For hex,
        use the format #RRGGBB and values between 0–9 or A–F.</span
      >
    </div>
  </div>
  <div v-input-container v-floating-ui-trigger vMY="4">
    <input v-input />
    <button v-button-icon buttonColor="tertiary" buttonSize="small" aria-label="toggle">
      <v-icon-visa-toggle>
        <svg v-toggle-default-template v-icon-visa-chevron-down-tiny></svg>
        <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny></svg>
      </v-icon-visa-toggle>
    </button>
  </div>
  <div v-listbox-container v-floating-ui-element>
    <ul v-listbox>
      <li v-listbox-item value="option-a">Option A</li>
      <li v-listbox-item value="option-b">Option B</li>
      <li v-listbox-item value="option-c">Option C</li>
      <li v-listbox-item value="option-d">Option D</li>
      <li v-listbox-item value="option-e">Option E</li>
    </ul>
  </div>
</div>
