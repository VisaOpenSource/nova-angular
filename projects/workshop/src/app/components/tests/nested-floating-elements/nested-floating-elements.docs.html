<div v-floating-ui-container>
  <button v-floating-ui-trigger v-button buttonColor="secondary" buttonSize="small" aria-label="toggle">
    Action 1
    <v-icon-visa-toggle>
      <svg v-toggle-default-template v-icon-visa-chevron-down-tiny></svg>
      <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny></svg>
    </v-icon-visa-toggle>
  </button>
  <div v-floating-ui-element vSurface vP="20">
    <div v-floating-ui-container>
      <button v-button v-floating-ui-trigger>
        Action 2
        <v-icon-visa-toggle>
          <svg v-toggle-default-template v-icon-visa-chevron-down-tiny></svg>
          <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny></svg>
        </v-icon-visa-toggle>
      </button>
      <div v-floating-ui-element vSurface vP="20" style="--v-surface-background: var(--v-message-background)">
        <ul v-dropdown-list vAddArrowKeys>
          <li>
            <button v-dropdown-item>Label 1</button>
          </li>
          <li>
            <button v-dropdown-item>Label 2</button>
          </li>
          <li>
            <button v-dropdown-item>Label 3</button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
