<div v-combobox v-floating-ui-container>
  <label v-label for="multiselect-disabled-options" id="multiselect-disabled-options-label">Label</label>
  <div v-input-container v-floating-ui-trigger vMY="4" vSurface vFlexRow vPL="3" vPR="6" vPY="3">
    <div vFlex vGap="2" vFlexShrink="1" vFlexGrow vFlexWrap>
      @for(item of chipArray(); track item.value; let i = $index) {
      <div v-chip vFlex vFlexShrink0 compact>
        <label v-label [for]="'with-disabled-option-' + item.value + '-' + i">{{ item.label }}</label>
        <button
          v-button-icon
          buttonColor="tertiary"
          subtle
          [attr.aria-label]="'Remove ' + item.label"
          aria-describedby="multiselect-disabled-options-label"
          [id]="'with-disabled-option-' + item.value + '-' + i"
          (click)="deleteChip(item.value)"
        >
          <svg v-icon-visa-clear-alt-tiny />
        </button>
      </div>
      }
      <input
        v-input
        vFlexShrink="1"
        vFlexBasis="50px"
        id="multiselect-disabled-options"
        name="multiselect-disabled-options"
        aria-describedby="multiselect-default-no-results"
      />
    </div>
    <button v-button-icon buttonColor="tertiary" buttonSize="small" aria-label="toggle">
      <v-icon-visa-toggle>
        <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
        <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
      </v-icon-visa-toggle>
    </button>
  </div>
  <div v-listbox-container v-floating-ui-element>
    <ul v-listbox multiselect>
      @for(item of optionTypes; track item.value; let i = $index) {
      <li v-listbox-item [value]="item.value" [disabled]="i === 1">{{item.label}}</li>
      } @empty {
      <li
        style="min-block-size: 180px"
        vFlex
        vJustifyContentCenter
        vAlignItemsCenter
        aria-atomic="true"
        aria-live="assertive"
        id="multiselect-disabled-options-no-results"
      >
        <p vTypography="label-large">No results found</p>
      </li>
      }
    </ul>
  </div>
</div>
