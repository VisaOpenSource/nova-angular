<div v-combobox v-floating-ui-container>
  <label v-label for="multiselect-inline-message" id="multiselect-inline-message-label">Label</label>
  <div v-input-container v-floating-ui-trigger vMY="4" vSurface vFlexRow vPL="3" vPR="6" vPY="3">
    <div vFlex vGap="2" vFlexShrink="1" vFlexGrow vFlexWrap>
      @for(item of chipArray(); track item.value; let i = $index) {
      <div v-chip vFlex vFlexShrink0 compact>
        <label v-label [for]="'inline-message-' + item.value + '-' + i">{{ item.label }}</label>
        <button
          v-button-icon
          buttonColor="tertiary"
          subtle
          [attr.aria-label]="'Remove ' + item.label"
          aria-describedby="multiselect-inline-message-label"
          [id]="'inline-message-' + item.value + '-' + i"
          (click)="deleteChip(item.value)"
        >
          <svg v-icon-visa-clear-alt-tiny />
        </button>
      </div>
      }
      <input
        v-input
        vFlexShrink="1"
        vFlexBasis="50px"
        id="multiselect-inline-message"
        name="multiselect-inline-message"
        aria-describedby="multiselect-inline-message multiselect-inline-message-no-results"
      />
    </div>
    <button v-button-icon buttonColor="tertiary" buttonSize="small" aria-label="toggle">
      <v-icon-visa-toggle>
        <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
        <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
      </v-icon-visa-toggle>
    </button>
  </div>
  <span v-input-message id="multiselect-inline-message"
    >This is optional text that describes the label in more detail.</span
  >
  <div v-listbox-container v-floating-ui-element>
    <ul v-listbox multiselect>
      @for(item of optionTypes; track item.value; let i = $index) {
      <li v-listbox-item [value]="item.value">{{item.label}}</li>
      }
    </ul>
  </div>
</div>
