@if (form(); as formRef) {
<div vFlexCol vGap="6" vMT="24">
  <div><button v-button (click)="dialogOpen.set(true)">Open reusable dialog</button></div>

  @let values = formRef.values();
  <nova-reusable-dialog
    [(open)]="dialogOpen"
    [description]="values['description']"
    [dismissible]="values['dismissible']"
    [messageType]="$any(values['messageType'])"
    [primaryButtonLabel]="values['showPrimaryButton'] ? values['primaryButtonLabel'] : undefined"
    [secondaryButtonLabel]="values['showSecondaryButton'] ? values['secondaryButtonLabel'] : undefined"
    [showIcon]="values['showIcon']"
    [title]="values['title']"
    (primaryButtonClick)="handlePrimaryClick()"
    (secondaryButtonClick)="handleSecondaryClick()"
  />
</div>
}
<nova-dynamic-reusable-form [properties]="propertyConfigs" #formComponent />
