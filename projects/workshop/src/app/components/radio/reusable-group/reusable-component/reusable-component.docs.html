<fieldset [attr.aria-labelledby]="fieldsetLabelledBy()">
  @if (showLabel()){
  <legend v-label [id]="id() + '-legend'">{{label()+ (required() ? ' (required)' : '')}}</legend>
  } @if(description() && showMessage()){
  <div v-input-message [id]="id() + '-description'">{{description()}}</div>
  }
  <div
    vFlex
    [vFlexCol]="!horizontal()"
    [vGap]="horizontal() ? 24 : null"
    [attr.aria-required]="required() || null"
    role="radiogroup"
  >
    @for(radio of radios(); track id() + '-radio-' + i; let i = $index){
    <nova-reusable-radio
      [alignEnd]="alignEnd()"
      [message]="radio.message"
      [disabled]="disabled() || radio.disabled"
      [invalid]="invalid()"
      [label]="radio.label"
      [panel]="panel()"
      [name]="name() || formControlName() || id() + '-radio'"
      [value]="radio.value"
    />
    }
  </div>

  @if(message()){
  <span
    v-input-message
    [id]="id() + '-message'"
    [attr.aria-atomic]="invalid() || undefined"
    [attr.aria-live]="invalid() ? 'assertive' : undefined"
  >
    @if(invalid()){
    <svg v-icon-visa-error-tiny />
    } {{ message() }}
  </span>
  }
</fieldset>
