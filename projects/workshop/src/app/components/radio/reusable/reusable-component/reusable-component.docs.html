@if(panel()){
<div v-radio-panel (click)="persistClick()">
  <ng-template [ngTemplateOutlet]="radioContent" />
</div>
} @else {
<ng-template [ngTemplateOutlet]="radioContent" />
}

<ng-template #radioContent>
  <div
    v-input-container
    vFlex
    [vAlignItemsStart]="!alignEnd()"
    [vAlignItemsCenter]="alignEnd()"
    [vFlexRowReverse]="alignEnd()"
  >
    <input
      v-radio
      (blur)="onTouched()"
      [checked]="checked()"
      (change)="handleChange($event)"
      [attr.aria-describedby]="inputDescribedBy()"
      [attr.aria-required]="required() ? 'true' : null"
      [disabled]="disabled()"
      [id]="id() + '-input'"
      [invalid]="invalid()"
      [name]="name()"
      [required]="required()"
      type="radio"
      [value]="value()"
      #radioInput
    />
    <div vFlex vFlexCol vGap="2" vMY="8" [vFlexGrow]="alignEnd()">
      @if (showLabel()){
      <label v-label [for]="id() + '-input'">{{label()}}</label>
      } @if(showMessage()){
      <span v-input-message [id]="id() + '-description'"> {{ message() }} </span>
      }
    </div>
  </div>
</ng-template>
