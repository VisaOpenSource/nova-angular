<table v-table [dividerLines]="true" [alternate]="false">
  <caption vSR>
    Table with group headers and empty cell.
  </caption>
  <thead>
    <tr>
      <th></th>
      <th v-th [groupHeader]="true" scope="col" id="group-header-1">Group header 1</th>
      <th v-th [groupHeader]="true" scope="col" id="group-header-2">Group header 2</th>
    </tr>
    <tr>
      <th v-th id="column-a">Column A</th>
      <th v-th id="column-b" headers="group-header-1">Column B</th>
      <th v-th id="column-c" headers="group-header-2">Column C</th>
    </tr>
  </thead>
  <tbody>
    @for(rowItem of rowData(); track rowItem; let i = $index){
    <tr>
      <th v-td headers="col-{{$index}}" id="row-{{$index}}">{{ rowItem['col-a'] }}</th>
      <td v-td headers="col-{{$index}} group-header-1 row-{{$index}}">{{ rowItem['col-b'] }}</td>
      <td v-td headers="col-{{$index}} group-header-2 row-{{$index}}">{{ rowItem['col-c'] }}</td>
    </tr>
    }
  </tbody>
</table>
