<table v-table [alternate]="true" tableSize="compact">
  <caption vSR>
    Table with compact padding and banded rows.
  </caption>
  <thead>
    <tr v-tr>
      @for(colItem of columnData(); track colItem){
      <th v-th scope="col">{{ colItem }}</th>
      }
    </tr>
  </thead>
  <tbody v-tbody>
    @for(rowItem of rowData(); track rowItem){
    <tr v-tr>
      <td v-td>{{ rowItem['col-a'] }}</td>
      <td v-td>{{ rowItem['col-b'] }}</td>
      <td v-td>{{ rowItem['col-c'] }}</td>
      <td v-td>{{ rowItem['col-d'] }}</td>
    </tr>
    }
  </tbody>
</table>
