@if (form(); as formRef) {
<div vFlexCol vGap="6" vMT="24">
  @let values = formRef.values();
  <nova-reusable-table
    id="demo-reusable-table"
    [alternate]="values['alternate']"
    [caption]="values['caption']"
    [columns]="parseColumns(values['columns'])"
    [dividerLines]="values['dividerLines']"
    [groupHeaders]="values['showGroupHeaders'] ? parsegroupHeaders(values['groupHeaders']) : []"
    [horizontalDividerLines]="values['horizontalDividerLines']"
    [keyValue]="values['keyValue']"
    [rows]="parseRows(values['rows'])"
    [subtle]="values['subtle']"
    [tableSize]="values['tableSize']"
  />
</div>
}
<nova-dynamic-reusable-form [properties]="propertyConfigs" #formComponent />
