<table v-table [dividerLines]="true" [alternate]="false">
  <caption vSR>
    Table with group headers.
  </caption>
  <thead>
    <tr>
      <th v-th [groupHeader]="true" scope="col" colspan="2" id="group-header-1">Group header 1</th>
      <th v-th [groupHeader]="true" scope="col" colspan="2" id="group-header-2">Group header 2</th>
    </tr>
    <tr>
      @for(colItem of columnData(); track colItem; let i = $index){
      <th v-th scope="col" id="col-{{$index}}">{{ colItem }}</th>
      }
    </tr>
  </thead>
  <tbody>
    @for(rowItem of rowData(); track rowItem; let i = $index){
    <tr>
      <th v-td id="row-header-{{$index}}" headers="group-header-1 col-1">{{ rowItem['col-a'] }}</th>
      <td v-td headers="group-header-1 col-1 row-header-{{$index}}">{{ rowItem['col-b'] }}</td>
      <td v-td headers="group-header-2 col-2 row-header-{{$index}}">{{ rowItem['col-c'] }}</td>
      <td v-td headers="group-header-2 col-3 row-header-{{$index}}">{{ rowItem['col-d'] }}</td>
    </tr>
    }
  </tbody>
</table>
