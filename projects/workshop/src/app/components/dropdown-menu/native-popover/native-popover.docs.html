<div>
  <button v-button popovertarget="mypopover" #trigger>
    Action
    <v-icon-visa-toggle [rotated]="isShown()">
      <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
      <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
    </v-icon-visa-toggle>
  </button>
  <div id="mypopover" popover (toggle)="onToggle($event)" #popup>
    <div v-dropdown-menu vFlex vFlexCol>
      <ul v-dropdown-list vAddArrowKeys>
        <li>
          <button v-dropdown-item subtle><svg v-icon-visa-export-tiny /> Label 1</button>
        </li>
        <li>
          <button v-dropdown-item subtle><svg v-icon-visa-copy-tiny /> Label 2</button>
        </li>
        <li>
          <button v-dropdown-item subtle><svg v-icon-visa-file-download-tiny /> Label 3</button>
        </li>
        <li>
          <button v-button v-dropdown-item destructive><svg v-icon-visa-delete-tiny /> Label 4</button>
        </li>
      </ul>
    </div>
  </div>
</div>
