@if(!workshopService.isLoadingExamples()){

<h2 vTypography="headline-2" vMT="36">Text button dropdown menus</h2>

<nova-workshop-example
  exampleTitle="Default text button dropdown menu"
  selector="nova-workshop-dropdown-menu-text-button"
>
  <nova-workshop-dropdown-menu-text-button></nova-workshop-dropdown-menu-text-button>
</nova-workshop-example>

<h2 vTypography="headline-2" vMT="36">Icon button dropdown menus</h2>

<nova-workshop-example
  exampleTitle="Default icon button dropdown menu"
  selector="nova-workshop-dropdown-menu-icon-button"
>
  <nova-workshop-dropdown-menu-icon-button></nova-workshop-dropdown-menu-icon-button>
</nova-workshop-example>

<h2 vTypography="headline-2" vMT="36">Custom dropdown menus</h2>

<nova-workshop-example
  exampleTitle="Dropdown menu with leading icons and destructive action"
  selector="nova-workshop-dropdown-menu-custom-buttons"
>
  <nova-workshop-dropdown-menu-custom-buttons></nova-workshop-dropdown-menu-custom-buttons>
</nova-workshop-example>

<nova-workshop-example exampleTitle="Dropdown menu with links" selector="nova-workshop-dropdown-menu-custom-links">
  <nova-workshop-dropdown-menu-custom-links></nova-workshop-dropdown-menu-custom-links>
</nova-workshop-example>

<nova-workshop-example exampleTitle="Dropdown menu with form" selector="nova-workshop-dropdown-menu-form">
  <nova-workshop-dropdown-menu-form></nova-workshop-dropdown-menu-form>
</nova-workshop-example>

<nova-workshop-example
  selector="nova-workshop-dropdown-menu-native-popover"
  exampleTitle="Dropdown menu native popover (instead of Floating UI service)"
>
  <div v-section v-message messageType="information" vMB="12" ngProjectAs="example-component-prefix">
    <svg v-message-icon v-icon-visa-information-low aria-hidden="false" aria-label="Information" role="img" />
    <div v-message-content>
      <p>
        Learn more about the Popover API on
        <a v-link vOpensInNewTab href="https://developer.mozilla.org/en-US/docs/Web/API/Popover_API">
          MDN's reference documenation
          <svg v-icon-visa-maximize-tiny />.
        </a>
      </p>
    </div>
  </div>
  <nova-workshop-dropdown-menu-native-popover></nova-workshop-dropdown-menu-native-popover>
</nova-workshop-example>
}
