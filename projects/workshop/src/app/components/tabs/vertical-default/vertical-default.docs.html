<div vFlex vFlexWrap vGap="8">
  <ul v-tabs vertical vFlexBasis="30%" aria-label="Default vertical tab">
    @for(item of tabContent; track item.id; let i = $index){
    <li v-tab-item [active]="i === selectedButtonTab">
      <button
        v-button
        [attr.aria-controls]="item.id + '-vertical-tabs-' + i"
        [id]="item.id + '-vertical-tabs-' + i"
        (click)="showPanel(i)"
      >
        {{ item.tabLabel }}
      </button>
    </li>
    }
  </ul>
  <div vFlex vFlexGrow>
    @for(item of tabContent; track item.id; let i = $index){
    <div
      vSurface
      class="v-elevation-inset"
      style="min-block-size: 200px"
      role="tabpanel"
      vP="10"
      [vHide]="
              selectedButtonTab !== i
            "
      [id]="item.id"
      [attr.aria-labelledby]="item.id + '-vertical-tabs-' + i"
    >
      {{ item.text }}
    </div>
    }
  </div>
</div>
