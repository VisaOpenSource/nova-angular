<a v-skip-to-content v-link routerLink="./" fragment="content">Skip to content</a>
<header v-nav vJustifyContentBetween>
  <div v-floating-ui-container>
    <button
      v-floating-ui-trigger
      v-button-icon
      buttonColor="tertiary"
      buttonSize="large"
      vContainerHide="desktop"
      aria-label="open menu"
    >
      <svg v-icon-visa-menu-low />
    </button>
    <nav v-dropdown-menu vPY="4" vPR="8">
      <ul v-tabs vertical>
        <li v-tab-item>
          <a v-button buttonColor="tertiary" buttonSize="large" href="./components/horizontal-navigation">L1 label 1</a>
        </li>
        <li v-tab-item>
          <a v-button buttonColor="tertiary" buttonSize="large" href="./components/horizontal-navigation">L1 label 2</a>
        </li>
        <li v-tab-item>
          <a v-button buttonColor="tertiary" buttonSize="large" href="./components/horizontal-navigation">L1 label 3</a>
        </li>
      </ul>
    </nav>
  </div>
  <a
    v-link
    noUnderline
    vMX="auto"
    vGap="16"
    aria-label="Visa Application Name Home"
    href="./components/horizontal-navigation"
    class="v-link-unstyled"
    ><svg v-logo-visa />
    <div vTypography="headline-3" vContainerHide="xs" class="v-nav-app-name">Application name</div>
  </a>
  <nav
    vFlex
    vFlexGrow
    vJustifyContentEnd
    vGap="4"
    vML="auto"
    vContainerHide="mobile"
    aria-label="Horizontal with persistent search"
  >
    <ul v-tabs>
      <li v-tab-item>
        <a v-button buttonColor="tertiary" buttonSize="large" href="./components/horizontal-navigation">L1 label 1</a>
      </li>
      <li v-tab-item>
        <a v-button buttonColor="tertiary" buttonSize="large" href="./components/horizontal-navigation">L1 label 2</a>
      </li>
      <li v-tab-item vContainerHide="mobile" v-floating-ui-container>
        <button v-button buttonColor="tertiary" buttonSize="large" v-floating-ui-trigger>
          L1 label 3
          <v-icon-visa-toggle>
            <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
            <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
          </v-icon-visa-toggle>
        </button>
        <div v-dropdown-menu vFlex vFlexCol>
          <ul v-dropdown-list vAddArrowKeys>
            <li>
              <a v-dropdown-item v-link vFlex vJustifyContentStart href="./components/horizontal-navigation">
                L2 label 1
              </a>
            </li>
            <li>
              <a v-dropdown-item v-link vFlex vJustifyContentStart href="./components/horizontal-navigation">
                L2 label 2
              </a>
            </li>
          </ul>
        </div>
      </li>
    </ul>
  </nav>
  <div vFlex vML="8" vGap="8">
    <div v-input-container vContainerHide="xs">
      <svg v-icon-visa-search-low />
      <!-- padding logic below prevents input from growing visually when clear button appears-->
      <input
        v-input
        (focus)="focus()"
        (blur)="blur($event)"
        [(value)]="value"
        #inputRef
        placeholder="Search"
        aria-label="Search site"
        [vPR]="!(value.length > 0 && inFocus()) ? 38 : 0"
      />
      @if (value.length > 0 && inFocus()) {
      <button
        v-button-icon
        (focus)="focus()"
        (blur)="blur($event)"
        buttonSize="small"
        subtle
        buttonColor="tertiary"
        aria-label="clear search"
        (click)="clearAndFocus()"
        #searchClearBtn
      >
        <svg v-icon-visa-clear-alt-tiny />
      </button>
      }
    </div>
    <button
      v-button-icon
      aria-label="notifications"
      aria-describedby="badge-persistent-search"
      buttonColor="tertiary"
      buttonSize="large"
      vContainerHide="mobile"
    >
      <svg v-icon-visa-notifications-low />
      <sup v-badge badgeType="number" id="badge-persistent-search">3</sup>
    </button>
    <div v-tab-item vContainerHide="mobile" v-floating-ui-container vPB="0">
      <button v-button aria-label="Account" buttonColor="tertiary" buttonSize="large" v-floating-ui-trigger>
        <svg v-avatar v-icon-visa-account-low />
        <v-icon-visa-toggle>
          <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
          <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
        </v-icon-visa-toggle>
      </button>
      <div v-dropdown-menu vFlex vFlexCol>
        <ul v-dropdown-list vAddArrowKeys>
          <li>
            <a v-dropdown-item v-link vFlex vJustifyContentStart href="./components/horizontal-navigation">
              L2 label 1
            </a>
          </li>
          <li>
            <a v-dropdown-item v-link vFlex vJustifyContentStart href="./components/horizontal-navigation">
              L2 label 2
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
