<a v-skip-to-content v-link routerLink="./" fragment="content">Skip to content</a>
<header v-nav vJustifyContentBetween>
  <!-- nav elements when search is collapsed -->
  @if (!searchExpanded()) {
  <div v-floating-ui-container>
    <button
      v-floating-ui-trigger
      v-button-icon
      buttonColor="tertiary"
      buttonSize="large"
      vContainerHide="desktop"
      aria-label="open menu"
    >
      <svg v-icon-visa-menu-low />
    </button>
    <nav v-dropdown-menu vFlex vFlexCol>
      <ul v-dropdown-list vAddArrowKeys>
        <li>
          <a v-dropdown-item v-link vFlex JustifyContentStart href="./components/horizontal-navigation">L1 label 1</a>
        </li>
        <li>
          <a v-dropdown-item v-link vFlex JustifyContentStart href="./components/horizontal-navigation">L1 label 2</a>
        </li>
        <li>
          <a v-dropdown-item v-link vFlex JustifyContentStart href="./components/horizontal-navigation">L1 label 3</a>
        </li>
      </ul>
    </nav>
  </div>
  <a
    v-link
    noUnderline
    vMX="auto"
    vGap="16"
    aria-label="Visa Application Name Home"
    href="./components/horizontal-navigation"
    class="v-link-unstyled"
    ><svg v-logo-visa />
    <div vTypography="headline-3" vContainerHide="xs" class="v-nav-app-name">Application name</div>
  </a>
  <nav
    vFlex
    vFlexGrow
    vJustifyContentEnd
    vGap="4"
    vML="auto"
    vContainerHide="mobile"
    aria-label="Horizontal with icons"
  >
    <ul v-tabs>
      <li>
        <a v-button buttonColor="tertiary" buttonSize="large" href="./components/horizontal-navigation"
          ><svg v-icon-visa-statistics-tiny />L1 label 1</a
        >
      </li>
      <li>
        <a v-button buttonColor="tertiary" buttonSize="large" href="./components/horizontal-navigation"
          ><svg v-icon-visa-settings-tiny />L1 label 2</a
        >
      </li>
      <li v-tab-item vContainerHide="mobile" v-floating-ui-container>
        <button v-button buttonColor="tertiary" buttonSize="large" v-floating-ui-trigger>
          <svg v-icon-visa-security-tiny />
          L1 label 3
          <v-icon-visa-toggle>
            <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
            <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
          </v-icon-visa-toggle>
        </button>
        <div v-dropdown-menu vFlex vFlexCol>
          <ul v-dropdown-list vAddArrowKeys>
            <li>
              <a v-dropdown-item v-link vFlex JustifyContentStart href="./components/horizontal-navigation"
                >L2 label 1</a
              >
            </li>
            <li>
              <a v-dropdown-item v-link vFlex JustifyContentStart href="./components/horizontal-navigation">
                L2 label 2
              </a>
            </li>
          </ul>
        </div>
      </li>
    </ul>
  </nav>
  <div vFlex vML="8" vGap="8">
    <button
      #searchButton
      v-button-icon
      buttonColor="tertiary"
      buttonSize="large"
      aria-label="search site"
      (click)="searchExpanded.set(true)"
    >
      <svg v-icon-visa-search-low />
    </button>
    <button
      v-button-icon
      aria-label="notifications"
      aria-describedby="with-icons-badge"
      buttonColor="tertiary"
      buttonSize="large"
      vContainerHide="mobile"
    >
      <svg v-icon-visa-notifications-low />
      <sup v-badge badgeType="number" id="with-icons-badge">3</sup>
    </button>
    <div v-tab-item vContainerHide="mobile" v-floating-ui-container>
      <button v-button aria-label="Account" buttonColor="tertiary" buttonSize="large" v-floating-ui-trigger>
        <svg v-avatar v-icon-visa-account-low />
        <v-icon-visa-toggle>
          <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
          <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
        </v-icon-visa-toggle>
      </button>
      <div v-dropdown-menu vFlex vFlexCol>
        <ul v-dropdown-list vAddArrowKeys>
          <li>
            <a v-dropdown-item v-link vFlex JustifyContentStart href="./components/horizontal-navigation">L2 label 1</a>
          </li>
          <li>
            <button v-dropdown-item v-link vFlex JustifyContentStart href="./components/horizontal-navigation">
              L2 label 2
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
  }

  <!-- expanded search -->
  @if (searchExpanded()) {
  <div
    vSurface
    vFlex
    vPL="12"
    vMY="9"
    style="
      --v-surface-background: var(--palette-default-surface-3);
      --v-surface-border-radius: var(--size-rounded-medium);
    "
  >
    <div v-input-container>
      <svg v-icon-visa-search-low />
      <input
        v-input
        name="navigation-search-field"
        required
        type="search"
        aria-label="Search"
        placeholder="Search"
        #searchInput
      />
    </div>
    <button
      (click)="searchExpanded.set(false)"
      vMY="5"
      vMX="8"
      aria-label="close"
      v-button-icon
      buttonColor="tertiary"
      buttonSize="large"
    >
      <svg v-icon-visa-close-low />
    </button>
  </div>
  }
</header>
