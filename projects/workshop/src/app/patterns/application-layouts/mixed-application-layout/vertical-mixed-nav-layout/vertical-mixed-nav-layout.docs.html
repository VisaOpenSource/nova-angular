<div v-nav vertical class="layout-vertical-mixed">
    @if(navOpen){
    <nav aria-label="Vertical with icons" vMB="6" class="mixed-vertical-tabs">
      <ul v-tabs vertical>
        <li v-tab-item>
          <a v-button buttonColor="tertiary" href="./patterns/application-layouts">
            <svg v-icon-visa-statistics-tiny />
            L2 label 1</a
          >
        </li>
        <li v-tab-item>
          <a v-button buttonColor="tertiary" href="./patterns/application-layouts">
            <svg v-icon-visa-settings-tiny />
            L2 label 2</a
          >
        </li>
        <li v-tab-item>
          <a v-button buttonColor="tertiary" href="./patterns/application-layouts">
            <svg v-icon-visa-security-tiny />
            L2 label 3</a
          >
        </li>
        <li v-tab-item>
          <a v-button buttonColor="tertiary" href="./patterns/application-layouts">
            <svg v-icon-visa-notes-tiny />
            L2 label 4</a
          >
        </li>
        <li v-tab-item>
          <a v-button buttonColor="tertiary" href="./patterns/application-layouts">
            <svg v-icon-visa-support-ticket-tiny />
            L2 label 5</a
          >
        </li>
      </ul>
    </nav>
    }
    <hr v-divider dividerType="decorative" vMB="6" vMT="auto" style="inline-size: 100%" />

    <button
      v-button-icon
      buttonColor="tertiary"
      buttonSize="small"
      subtle
      [vML]="navOpen ? 'auto' : ''"
      [vMR]="navOpen ? 8 : ''"
      [vMX]="navOpen ? '' : 5"
      (click)="navOpen = !navOpen"
      aria-label="Side bar"
      [aria-expanded]="navOpen"
    >
      @if(navOpen){
      <svg v-icon-visa-media-rewind-tiny />} @else {
      <svg v-icon-visa-media-fast-forward-tiny />
      }
    </button>
</div>
