<dialog
  #dialog
  v-dialog
  v-message
  [attr.aria-labelledby]="titleId()"
  [attr.aria-describedby]="descriptionId()"
  [id]="dialogId()"
  (keydown)="handleKeyDown($event)"
  style="max-width: 400px; --v-message-display: block; overflow-y: auto"
  vPX="0"
>
  <button
    v-button-icon
    buttonColor="tertiary"
    buttonSize="small"
    subtle
    (click)="handleClose()"
    vMT="-20"
    vML="-12"
    vMR="-18"
    aria-label="Close"
    style="margin-inline-end: 4px; float: inline-end"
  >
    <svg v-icon-visa-close-tiny />
  </button>
  <div v-message-content vPB="2" vPR="2" style="overflow-y: visible">
    <div vPX="24">
      <h2 v-dialog-header [id]="titleId()">
        <span>{{ title() }}</span>
      </h2>
      <p v-dialog-text [id]="descriptionId()">{{ description() }}</p>
    </div>

    <div vFlex vAlignItemsCenter vFlexWrap vGap="8" vPT="16" vPX="24">
      <button v-button buttonColor="secondary" (click)="handleSelectFiles()">
        Select file(s)
      </button>
    </div>

    <div vMT="20">
      <div v-divider dividerType="decorative"></div>
    </div>

    <!-- Queue of selected files awaiting upload -->
    <ul
      vFlex
      vFlexCol
      vGap="8"
      vPY="12"
      vPX="24"
      vFlex
      vFlexCol
      vGap="8"
      style="min-height: min(25vh, 266px)"
    >
      @for (queuedFile of queuedFiles(); track queuedFile.id) {
      <li
        vFlex
        vFlexCol
        vGap="5"
        nova-upload-card
        [file]="queuedFile"
        [actionsTemplate]="deleteActionsTemplate"
      ></li>

      <!-- Delete button allows removing files from queue before upload -->
      <ng-template #deleteActionsTemplate let-errorId="errorId">
        <button
          v-button
          v-button-icon
          buttonColor="tertiary"
          [attr.aria-label]="'Delete ' + queuedFile.file.name"
          (click)="handleDeleteQueuedFile(queuedFile)"
        >
          <svg v-icon-visa-delete-tiny aria-hidden="true"></svg>
        </button>
      </ng-template>
      }
    </ul>

    <hr v-divider dividerType="decorative" />

    <!-- Primary actions: upload or cancel -->
    <div vFlex vAlignItemsCenter vFlexWrap vGap="8" vPT="16" vPX="24">
      <button v-button (click)="handleUpload()">Upload</button>
      <button v-button buttonColor="secondary" (click)="handleClose()">
        Cancel
      </button>
    </div>
  </div>
</dialog>
