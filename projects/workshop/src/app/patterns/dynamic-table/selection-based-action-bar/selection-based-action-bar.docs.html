<!-- selection based action bar example content -->
<div vPX="16" vPY="8" vSurface="2" class="v-action-bar">
  <div vFlex vJustifyContentBetween vAlignItemsCenter vGap="20" vFlexWrap>
    <div vFlex vGap="8" vFlexWrap>
      <button v-button>Primary action</button>
      <button v-button [disabled]="amountSelected() < 1" buttonColor="secondary">Secondary action</button>
      <button v-button [disabled]="amountSelected() < 1" buttonColor="tertiary">Tertiary action</button>
    </div>
    <div vFlex vGap="8">
      @if (amountSelected() > 0) {
      <div v-chip compact vFlex>
        <span>{{ amountSelected() }} selected</span>
        <button (click)="clear.emit()" v-button-icon buttonColor="tertiary" subtle aria-label="clear selected rows">
          <svg v-icon-visa-clear-alt-tiny />
        </button>
      </div>
      }
      <button
        v-button-icon
        buttonSize="small"
        buttonColor="tertiary"
        aria-label="filter table - selection-based action bar"
      >
        <svg v-icon-visa-filter-alt-tiny />
      </button>
      <button
        v-button-icon
        buttonSize="small"
        buttonColor="tertiary"
        aria-label="table settings - selection-based action bar"
      >
        <svg v-icon-visa-settings-tiny />
      </button>
    </div>
  </div>
</div>
