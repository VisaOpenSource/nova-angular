<!-- toggle action bar example content -->
<div vPX="16" vPY="8" vSurface="2" class="v-action-bar">
  <div vFlex vJustifyContentBetween vGap="20" vFlexWrap>
    <div vFlex vGap="8" vAlignItemsCenter>
      <div v-floating-ui-container>
        <button v-button v-floating-ui-trigger>
          Action
          <v-icon-visa-toggle>
            <svg v-toggle-default-template v-icon-visa-chevron-down-tiny />
            <svg v-toggle-rotated-template v-icon-visa-chevron-up-tiny />
          </v-icon-visa-toggle>
        </button>
        <div v-dropdown-menu vFlex vFlexCol>
          <ul v-dropdown-list vAddArrowKeys>
            <li>
              <button v-dropdown-item>Action 1</button>
            </li>
            <li>
              <button v-dropdown-item>Action 2</button>
            </li>
            <li>
              <button v-dropdown-item>Action 3</button>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <div vFlex vGap="8" vAlignItemsCenter>
      <fieldset v-toggle-container vFlex vFlexRow>
        <button v-toggle vGap="6" aria-label="Label 1">
          <svg v-icon-visa-view-grid-low />
        </button>
        <button v-toggle vGap="6" active aria-label="Label 2">
          <svg v-icon-visa-map-low />
        </button>
      </fieldset>
      <button
        v-button-icon
        buttonSize="small"
        buttonColor="tertiary"
        aria-label="filter table - selection-based action bar"
      >
        <svg v-icon-visa-filter-alt-tiny />
      </button>
    </div>
  </div>
</div>
