<div vFlex vFlexCol vGap="10" vP="8" style="min-inline-size: max-content">
  <div vFlex vFlexCol vGap="4">
    <label v-label [for]="id" [id]="id + '-label'">Show columns</label>
    <div
      v-listbox-container
      [id]="id"
      [attr.aria-labelledby]="id + '-label' + (hiddenColumnsLength() > 0 ? (' ' + id + '-message') : '')"
    >
      <ul v-listbox containHeight multiselect [(ngModel)]="selectedColumnsNonSignal" [id]="id + '-listbox'">
        @for(colItem of columnData(); track colItem.name; let i = $index) {
        <!-- **identifying and compact columns are not eligible to be hidden** -->
        @if (!colItem.identifier && !colItem.compact) {
        <li v-listbox-item [id]="'in-table-col-management-' + i" [value]="colItem.name">{{ colItem.name }}</li>
        } }
      </ul>
    </div>
    @if (hiddenColumnsLength() > 0) {
    <div v-input-message [id]="id + '-message'">{{ hiddenColumnsLength() }} column(s) hidden</div>
    }
  </div>
  <div vFlex vGap="16" vJustifyContentBetween>
    <button v-button (click)="toggleAllColVisibility.emit(selectedColumnsNonSignal)">Apply</button>
    <button v-button buttonColor="tertiary" (click)="resetTable.emit()">Reset table</button>
  </div>
</div>
