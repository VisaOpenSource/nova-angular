<div v-floating-ui-container [closeOnClick]="false" #filterDropdown placement="bottom-end">
  <button
    v-button-icon
    buttonSize="small"
    buttonColor="tertiary"
    aria-label="filter table - selection-based action bar"
    v-floating-ui-trigger
    #filterButton
  >
    <svg v-icon-visa-filter-alt-tiny />
    @if (filtersFlattened().length > 0) {
    <!-- Display the number of applied filters as a badge -->
    <sup
      v-badge
      vTypography="label-active"
      number
      [attr.aria-label]="filtersFlattened().length + 'unread notifications'"
      >{{ filtersFlattened().length }}
    </sup>
    }
  </button>
  <div v-dropdown-menu style="--v-surface-background: var(--palette-default-surface-1)">
    <div vFlex vFlexCol vGap="10" vP="7" vFlexGrow>
      <h4 vTypography="headline-4">All filters</h4>

      <div v-accordion multiselect vFlex vFlexCol vFlexGrow vGap="4">
        @for(colItem of columnData(); track colItem.name; let i = $index){ @if (colItem.headerActions) {
        <details v-accordion-item [open]="accordionFilterStates()[i]" (toggle)="toggleAccordion(i)">
          <!-- convert column name to kebab case to remove spaces in HTML attributes (id, for, aria-)-->
          @let colNameKebab = toKebabCase(colItem.name); @let columnFilterLength = filterLengthByColumn(colItem.name);
          <summary v-button v-accordion-heading [id]="'filter-options-for-' + colNameKebab" vFlex vAlignItemsCenter>
            <v-icon-visa-toggle>
              <svg v-toggle-default-template v-icon-visa-chevron-right-tiny />
              <svg v-toggle-rotated-template v-icon-visa-chevron-down-tiny />
            </v-icon-visa-toggle>
            {{ colItem.name }} @if (columnFilterLength > 0) {
            <span v-badge vTypography="label-active" vML="auto" number>{{columnFilterLength}}</span>
            }
          </summary>
          <div v-accordion-panel vP="2">
            <div vFlex vFlexCol vGap="16">
              <nova-workshop-dynamic-table-filter-checkbox-lists
                [appliedFilters]="appliedFilters()"
                [column]="colItem"
                [id]="id + '-filter-list-' + i"
                checkboxOnly
                (applyColumnFilters)="applyColumnFilters.emit(colItem.name)"
                (clearColumnFilters)="clearColumnFilters.emit(colItem.name)"
              />
            </div>
          </div>
        </details>
        }}
      </div>
      <div vFlex vGap="16" vJustifyContentBetween>
        <button v-button (click)="filterDropdownFocus(true); applyAllFilters.emit()">Apply</button>
        <button v-button buttonColor="tertiary" (click)="filterDropdownFocus(true); clearAllFilters.emit()">
          Clear all
        </button>
      </div>
    </div>
  </div>
</div>
