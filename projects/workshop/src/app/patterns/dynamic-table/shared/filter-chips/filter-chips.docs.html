@if (filtersFlattened().length > 0) {
<form vFlex vGap="8" [attr.aria-labelledby]="id() + '-filter-chips'">
  <span v-label [id]="id() + '-filter-chips'" vTypography="label-active">Filters applied:</span>
  <fieldset>
    <div vFlex>
      @for(columnName of columnNamesWithFilters(); track columnName){
      <legend v-label vSr>{{ columnName }}:</legend>
      <ul vFlex vGap="8" vFlexWrap>
        @for(filter of filters()[columnName] || []; track filter + i; let i = $index){
        <li>
          <div v-chip vFlex>
            <span>{{ filter }}</span>
            <button
              v-button-icon
              [attr.aria-label]="'clear ' + filter"
              subtle
              buttonColor="tertiary"
              (click)="clearFilter(columnName, filter)"
            >
              <svg v-icon-visa-clear-alt-tiny />
            </button>
          </div>
        </li>
        }
      </ul>
      }
    </div>
  </fieldset>
  <button v-button vAlignSelfStart (click)="clearAllFilters.emit()" buttonColor="tertiary">Clear all</button>
</form>
}
