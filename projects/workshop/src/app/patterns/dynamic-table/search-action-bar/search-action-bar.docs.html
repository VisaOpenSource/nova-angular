<!-- search action bar example content -->
<div vFlex vPX="16" vPY="8" vSurface="2" class="v-action-bar">
  <div vFlex vJustifyContentBetween vFlexWrap vFlexGrow vGap="20">
    <div vFlex vGap="8" vAlignItemsCenter>
      <h2 vTypography="headline-4">Headline</h2>
      <button v-button-icon buttonSize="small" buttonColor="tertiary" aria-label="refresh">
        <svg v-icon-visa-refresh-tiny />
      </button>
    </div>
    <div vFlex vGap="8" vAlignItemsCenter>
      <div v-input-container>
        <svg v-icon-visa-search-low />
        <!-- padding logic below prevents input from growing visually when clear button appears-->
        <input
          v-input
          (focus)="focus()"
          (blur)="blur($event)"
          [(value)]="value"
          #inputRef
          placeholder="Search"
          aria-label="Search table"
          [vPR]="!(value.length > 0 && inFocus()) ? 38 : 0"
        />
        @if (value.length > 0 && inFocus()) {
        <button
          v-button-icon
          (focus)="focus()"
          (blur)="blur($event)"
          buttonSize="small"
          subtle
          buttonColor="tertiary"
          aria-label="clear search"
          (click)="clearAndFocus()"
          #searchClearBtn
        >
          <svg v-icon-visa-clear-alt-tiny />
        </button>
        }
      </div>
      <button v-button-icon buttonSize="small" buttonColor="tertiary" aria-label="filter table - search action bar">
        <svg v-icon-visa-filter-alt-tiny />
      </button>
    </div>
  </div>
</div>
