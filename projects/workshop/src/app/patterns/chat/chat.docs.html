@if(!workshopService.isLoadingExamples()){

<nova-workshop-example exampleTitle="Default full page chat" selector="nova-workshop-full-page-chat">
  <nova-workshop-full-page-chat></nova-workshop-full-page-chat>
</nova-workshop-example>

  <nova-workshop-dialog-chat></nova-workshop-dialog-chat>
</nova-workshop-example>

<nova-workshop-example exampleTitle="Default panel chat" selector="nova-workshop-panel-chat" iframe>
</nova-workshop-example>
