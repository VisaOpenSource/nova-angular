<div vFlex vAlignItemsStart vFlexRowReverse vAlignSelfStretch vGap="8" [vPB]="hideTimestamp() ? 24 : 4">
  @if (!hideAvatar()) {
  <div style="padding-block-start: 18px;">
    <span v-avatar [small]="smallAvatar()" aria-label="user">
      {{ response().role.charAt(0).toUpperCase() }}
    </span>
  </div>
  }
  <div vFlex vFlexCol vAlignItemsEnd vGap="4" style="flex-grow: 1">
    @if (!hideTimestamp()) {
    <div vFlex vGap="8">
      <span vTypography="label-small">{{ response().role }}</span>
      <span vTypography="label-small">{{ response().timeStamp }}</span>
    </div>
    }
    <div vFlex vJustifyContentCenter style="margin-left: 88px;">
      <div vFlex vFlexCol vGap="4" id="user-chat-bubble" [tabIndex]="0"
        [attr.aria-label]="response().message + ' ' + response().code + ' message from ' + response().role + ' at ' + response().timeStamp + '. Press tab to navigate to more options.'"
        style="
                padding-block: 12px;
                padding-inline: 14px;
                border-radius: 10px;
                background-color: var(--palette-default-surface-3);
                min-inline-size: fit-content;
              ">
        <p vTypography="body-2">
          {{ response().message }}
        </p>
        <div vFlex vJustifyContentEnd vGap="4">
          <chat-actions />
        </div>
      </div>
    </div>
  </div>
</div>
