@if (copyData()) {
<div class="snippet-container markdown-style">
  <div class="snippet-copy">
    <!-- Button icon and text toggle between copy and copied states -->
    <button
      #copyButton
      v-button
      v-button-icon
      buttonColor="tertiary"
      buttonSize="small"
      [class.copied]="copyFlagOpen"
      class="w-copy-button"
      [attr.aria-label]="'copy ' + ariaLabelText()"
      (click)="onCopyToClipboard()"
    >
      @if (copyFlagOpen) {
      <svg v-icon-visa-checkmark-tiny></svg>
      } @else {
      <svg v-icon-visa-copy-tiny></svg>
      }
      <span vTypography="label-active">Copied!</span>
    </button>
  </div>
  <!-- language pipe formats code with syntax highlighting for the specified programming language -->
  <markdown [data]="copyData() | language: codeLanguage()"></markdown>
</div>
}
