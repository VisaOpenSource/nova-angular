<div vFlex vFlexCol vAlignItemsEnd vGap="8">
  <span vTypography="label">Prompt suggestions</span>
  <div vFlex vFlexWrap vGap="8" vAlignItemsEnd vJustifyContentEnd>
    @for (chip of chips; track chip; let i = $index) {
      <label v-chip v-chip-selection vGap="6"
             [for]="id + '-' + i"
             style="max-block-size: 32px; min-block-size: fit-content;">
        <span style="text-wrap: pretty">{{ chip }}</span>
        <input v-checkbox
               [attr.aria-label]="chip"
               [id]="id + '-' + i"
               type="checkbox"
               (change)="onSuggestionClick(chip)" />
      </label>
    }
  </div>
</div>
