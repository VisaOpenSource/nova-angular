<button id="chatbot-button" v-button-icon aria-label="AI Chatbot" (click)="showModal()">
  <img class="v-icon" role="presentation" src="imgs/chat-ai.svg" />
</button>
<dialog
  #dialogChat
  v-dialog
  v-message
  aria-describedby="id + '-description'"
  aria-labelledby="id + '-title'"
  id="dialog-chat"
  style="
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    inline-size: 500px;
    block-size: min(500px, 90vh);
    margin: 0;
    padding: 0;
    gap: 10px;
    flex-direction: column;
    overflow-x: auto;
  "
>
  <div
    vFlex
    vJustifyContentBetween
    vAlignItemsCenter
    style="
      block-size: 62px;
      border-radius: 10px;
      inline-size: 100%;
      min-inline-size: 300px;
      padding-block: 8px;
      padding-inline: 16px;
      flex-shrink: 0;
      background: var(--palette-default-surface-1, #fff);
      box-shadow: 0px 1px 3px 0px rgba(0, 0, 0, 0.05);
    "
    vTypography="subtitle-2"
    vTypographyColor="active"
  >
    <button v-button-icon aria-label="minimize dialog" buttonColor="tertiary" buttonSize="large" (click)="closeModal()">
      <svg v-icon-visa-minimize-low></svg>
    </button>
    <span id="id + '-title'" vTypography="headline-3">Chat name</span>
    <button v-button-icon aria-label="close dialog" buttonColor="tertiary" buttonSize="large" (click)="closeModal()">
      <svg v-icon-visa-close-low></svg>
    </button>
  </div>
  <div vFlex vFlexCol style="flex: 1; block-size: 500px; min-inline-size: 300px; overflow: auto" vP="16" v-message-content>
    <!-- hideTimestamp groups consecutive messages from same sender by hiding intermediate timestamps -->
    @for (response of currentChat().messages; track response.id; let index = $index) { @let prev =
    currentChat().messages[index - 1]; @let hideTimestamp = !(index === 0 || response.role !== prev?.role);

    <!-- "User 2" represents AI/system responses; other roles are user messages -->
    @if (response.role === "User 2") {
    <div style="margin-inline-end: 48px">
      <response-chat-bubble
        [response]="response"
        [smallAvatar]="true"
        [hideAvatar]="index !== 0 && response.role === prev?.role"
        [hideTimestamp]="hideTimestamp"
      ></response-chat-bubble>
    </div>
    } @else {
    <user-chat-bubble [response]="response" [hideAvatar]="true" [hideTimestamp]="hideTimestamp"></user-chat-bubble>
    } }
  </div>
  <div vFlex vFlexCol vGap="8" vP="16" style="overflow: auto; flex-shrink: 0; min-inline-size: 300px">
    <chat-input [showCharacterCount]="false"></chat-input>
  </div>
</dialog>
